services:
  debugbox:
    build:
      context: .
      args:
        USER_SETUP_SCRIPT: ""
    image: rpi-debugbox:latest
    container_name: debugbox
    privileged: true
    network_mode: host
    stdin_open: true
    tty: true
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
